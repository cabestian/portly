name: Portly
options:
  bundleIdPrefix: com.cabestian
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

packages:
  PortScanCore:
    path: PortScanCore

targets:
  PortlyApp:
    type: application
    platform: macOS
    sources:
      - PortlyApp
      - Assets.xcassets
    info:
      path: PortlyApp/Info.plist
      properties:
        LSUIElement: YES
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      path: PortlyApp/PortlyApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.cabestian.portly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cabestian.portly
    dependencies:
      - package: PortScanCore
      - target: PortlyWidget

  PortlyWidget:
    type: app-extension
    platform: macOS
    sources:
      - PortlyWidget
    info:
      path: PortlyWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: PortlyWidget/PortlyWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.cabestian.portly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cabestian.portly.widget
    dependencies:
      - package: PortScanCore
