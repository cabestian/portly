name: Portly
options:
  bundleIdPrefix: app
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic

packages:
  PortScanCore:
    path: PortScanCore

targets:
  PortlyApp:
    type: application
    platform: macOS
    sources:
      - PortlyApp
      - Assets.xcassets
    info:
      path: PortlyApp/Info.plist
      properties:
        LSUIElement: YES
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      path: PortlyApp/PortlyApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.portly
    dependencies:
      - package: PortScanCore
