name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: swift test (PortScanCore)
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.app

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-path --sdk macosx

      - name: Run tests
        working-directory: PortScanCore
        run: swift test --parallel

  build:
    name: build .app bundle
    runs-on: macos-15
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.app
      - name: Build
        run: ./scripts/build.sh
      - name: Verify bundle
        run: |
          test -x build/Portly.app/Contents/MacOS/Portly
          test -f build/Portly.app/Contents/Info.plist
          codesign -dvv build/Portly.app
